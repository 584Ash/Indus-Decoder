<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ashish Indus Decoder Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>🏺 Indus-Decoder <span>v2.0</span></h1>
        <div class="controls">
            <button id="toggleDir">Direction: RTL ⇄ LTR</button>
            <button id="clearAll">Clear Canvas</button>
        </div>
    </header>

    <main class="container">
        <aside class="sign-library">
            <h3>Sign Gallery</h3>
            <div class="search-bar">
                <input type="text" placeholder="Search signs (e.g. fish, jar)...">
            </div>
            <div class="grid" id="signGrid">
                <div class="sign-item" draggable="true" data-id="1">𐦛</div>
                <div class="sign-item" draggable="true" data-id="2">𐦽</div>
                <div class="sign-item" draggable="true" data-id="3">𐧚</div>
                </div>
        </aside>

        <section class="workspace">
            <h3>Decoding Canvas</h3>
            <div id="dropZone" class="drop-zone rtl-mode">
                <p class="placeholder">Drag signs here to decode...</p>
            </div>
            
            <div class="analysis-panel">
                <h4>Real-time Analysis</h4>
                <div id="stats">Frequency: -- | Context: -- | Possible Meaning: --</div>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
